      <animate attributeName="cy" values="284;312" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="2.4s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
  <rect x="358.0" y="292" width="104.0" height="18" rx="4" fill="#ffffff" stroke="#8C4FFF" stroke-width="0.8" opacity="0.95"/>
  <text x="410.0" y="305" text-anchor="middle" font-size="10.5" class="lbl" fill="#8C4FFF">forward request</text>

  <line x1="40" y1="780.5" x2="66" y2="780.5" stroke="#01A88D" stroke-width="2" marker-end="url(#ar-bedrock)"/>
  <text x="74" y="784.5" font-size="10.5" fill="#6B7280">Bedrock invoke / stream</text>
</svg>

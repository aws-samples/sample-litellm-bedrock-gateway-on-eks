      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="2.8s" begin="1.4s" repeatCount="indefinite"/>
    </circle>
  <line x1="410" y1="690" x2="410" y2="712" stroke="#527FFF" stroke-width="2" marker-end="url(#ar-db)"/>
  <rect x="354.8" y="693" width="110.4" height="18" rx="4" fill="#ffffff" stroke="#527FFF" stroke-width="0.8" opacity="0.95"/>

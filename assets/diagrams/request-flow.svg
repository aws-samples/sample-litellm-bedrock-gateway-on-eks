  <rect x="28" y="702" width="196" height="72" rx="8" fill="#ffffff" stroke="#C8C0AE" stroke-width="1"/>
  <text x="40" y="718" class="lbl" font-size="11" fill="#1F1B16">LEGEND</text>
  <line x1="40" y1="734" x2="66" y2="734" stroke="#6B7280" stroke-width="2" marker-end="url(#ar-gray)"/>

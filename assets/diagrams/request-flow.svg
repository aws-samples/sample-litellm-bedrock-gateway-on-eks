      <animate attributeName="cy" values="416;484" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  <path d="M 475.0 525 H 690" stroke="#DD344C" stroke-width="2" fill="none" marker-end="url(#ar-xacct)"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 800" width="960" height="800">
  <style>
    text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
    .title { font-weight: 700; }
    .lbl { font-weight: 600; }
    .sub { font-weight: 400; }
  </style>
  <defs>
    <marker id="ar-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
    </marker>
    <marker id="ar-net" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8C4FFF"/>
    </marker>
    <marker id="ar-eks" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ED7100"/>
    </marker>
    <marker id="ar-bedrock" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#01A88D"/>
    </marker>
    <marker id="ar-db" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#527FFF"/>
    </marker>
    <marker id="ar-xacct" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DD344C"/>
    </marker>
    <marker id="ar-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#DD344C"/>
    </marker>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1F1B16" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="960" height="800" fill="#ffffff"/>
  <text x="40" y="46" class="title" font-size="22" fill="#1F1B16">LiteLLM &#8594; Bedrock Gateway &#183; Request Flow</text>
  <text x="40" y="68" class="sub" font-size="13" fill="#6B7280">Happy path: client &#8594; ALB/WAF &#8594; LiteLLM pod (auth) &#8594; Bedrock InvokeModel &#8594; stream back &#183; async spend log</text>
  <line x1="40" y1="80" x2="920" y2="80" stroke="#C8C0AE" stroke-width="1"/>
  <g filter="url(#soft)">
    <rect x="260" y="100" width="300" height="66" rx="8" ry="8" fill="#f9fafb" stroke="#6B7280" stroke-width="1.5"/>
  </g>
  <rect x="260" y="100" width="5" height="66" rx="2.5" fill="#6B7280"/>
    <text x="410.0" y="124" text-anchor="middle" class="lbl" font-size="15" fill="#1F1B16">Client (Tokyo, public)</text>
    <text x="410.0" y="143" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">POST /v1/messages  |  /v1/chat/completions</text>
    <text x="410.0" y="159" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">header: x-api-key = sk-... (virtual key)</text>
  <g filter="url(#soft)">
    <rect x="260" y="210" width="300" height="74" rx="8" ry="8" fill="#faf5ff" stroke="#8C4FFF" stroke-width="1.5"/>
  </g>
  <rect x="260" y="210" width="5" height="74" rx="2.5" fill="#8C4FFF"/>
    <text x="410.0" y="234" text-anchor="middle" class="lbl" font-size="15" fill="#1F1B16">ALB  +  AWS WAF</text>
    <text x="410.0" y="253" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">WAF rules check &#183; TLS (ACM)</text>
    <text x="410.0" y="269" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">idle timeout 600s (streaming-safe)</text>
    <rect x="496" y="218" width="56" height="18" rx="9" fill="#8C4FFF" opacity="0.14"/>
    <text x="524" y="231" text-anchor="middle" font-size="10" class="lbl" fill="#8C4FFF">L7</text>
  <g filter="url(#soft)">

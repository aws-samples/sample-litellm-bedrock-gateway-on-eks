    <text x="410.0" y="364" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">EKS 1.31 &#183; 2 replicas &#183; v1.88.1</text>
    <text x="410.0" y="380" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">drop_params &#183; thinking params by model gen</text>
    <text x="410.0" y="398" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">virtual-key auth</text>
  <g filter="url(#soft)">
    <polygon points="410.0,492.0 475.0,525 410.0,558.0 345.0,525" fill="#ffffff" stroke="#6B7280" stroke-width="1.6"/>
  </g>

    <text x="795.0" y="535" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">invalid / missing key</text>
    <text x="795.0" y="551" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">request rejected</text>
  <g filter="url(#soft)">
    <rect x="20" y="600" width="210" height="76" rx="8" ry="8" fill="#fff7ed" stroke="#ED7100" stroke-width="1.5"/>
  </g>
  <rect x="20" y="600" width="5" height="76" rx="2.5" fill="#ED7100"/>

      <animate attributeName="cy" values="690;706" dur="3s" begin="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.8;1" dur="3s" begin="1.8s" repeatCount="indefinite"/>

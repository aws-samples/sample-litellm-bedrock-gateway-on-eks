    <text x="125.0" y="659" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">IAM creds (no static keys)</text>
  <g filter="url(#soft)">
    <rect x="260" y="600" width="300" height="90" rx="8" ry="8" fill="#f0fdfa" stroke="#01A88D" stroke-width="1.5"/>
  </g>
  <rect x="260" y="600" width="5" height="90" rx="2.5" fill="#01A88D"/>

    <text x="410.0" y="538" text-anchor="middle" class="lbl" font-size="13" fill="#1F1B16">valid?</text>
  <g filter="url(#soft)">
    <rect x="690" y="492" width="210" height="66" rx="8" ry="8" fill="#fef2f2" stroke="#DD344C" stroke-width="1.5"/>
  </g>
  <rect x="690" y="492" width="5" height="66" rx="2.5" fill="#DD344C"/>

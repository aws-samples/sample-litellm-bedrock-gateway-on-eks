  <rect x="591.0" y="623" width="54" height="18" rx="4" fill="#ffffff" stroke="#01A88D" stroke-width="0.8" opacity="0.95"/>
  <text x="618" y="636" text-anchor="middle" font-size="10.5" class="lbl" fill="#01A88D">tokens</text>
  <path d="M 795 610 V 133 H 560" stroke="#01A88D" stroke-width="2" fill="none" marker-end="url(#ar-bedrock)"/>
  <rect x="711.0" y="369" width="168.0" height="18" rx="4" fill="#ffffff" stroke="#01A88D" stroke-width="0.8" opacity="0.95"/>
  <text x="795" y="382" text-anchor="middle" font-size="10.5" class="lbl" fill="#01A88D">stream response to client</text>

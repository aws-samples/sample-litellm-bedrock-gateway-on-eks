  <text x="620" y="525" text-anchor="middle" font-size="10.5" class="lbl" fill="#DD344C">no</text>
  <line x1="410.0" y1="558.0" x2="410.0" y2="600" stroke="#ED7100" stroke-width="2" marker-end="url(#ar-eks)"/>
    <circle r="4.5" fill="#ED7100">
      <animate attributeName="cx" values="410.0;410.0" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="558.0;592" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="2.4s" begin="0.9s" repeatCount="indefinite"/>

    <text x="410.0" y="643" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">claude-sonnet-4-6 &#183; streaming</text>
    <text x="410.0" y="659" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">global.*  |  us.* (peering)</text>
    <text x="410.0" y="675" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">cross-account AssumeRole+TagSession</text>
    <rect x="496" y="608" width="56" height="18" rx="9" fill="#01A88D" opacity="0.14"/>
    <text x="524" y="621" text-anchor="middle" font-size="10" class="lbl" fill="#01A88D">4 LAYER</text>
  <g filter="url(#soft)">

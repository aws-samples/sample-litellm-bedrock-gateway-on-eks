<text x="300.0" y="250" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">creds &#183; account-not-prod &#183; region &#183; bootstrap</text>
<text x="300.0" y="266" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">Bedrock model ACTIVE &#183; service quota checks</text>

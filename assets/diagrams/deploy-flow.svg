<text x="116.0" y="768" class="sub" font-size="10.5" fill="#6B7280">Ingress (ALB idle timeout 600s)</text>
<text x="116.0" y="781" class="sub" font-size="10.5" fill="#6B7280">WAF &#183; internal by default</text>

<text x="625.0" y="398" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">exit non-zero</text>
<text x="625.0" y="414" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">no partial stacks</text>
<line x1="300" y1="436" x2="300" y2="470" stroke="#ED7100" stroke-width="2" marker-end="url(#arrow-main)"/>
<circle r="4" fill="#ED7100">
  <animate attributeName="cx" values="300;300" dur="2.4s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="436;462" dur="2.4s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" repeatCount="indefinite"/>
</circle>
<rect x="306" y="444.0" width="29.799999999999997" height="18" rx="4" fill="#ffffff" stroke="#C8C0AE" stroke-width="0.8"/>
<text x="311" y="457.0" font-size="11" fill="#6B7280">yes</text>
<rect x="70" y="470" width="460" height="322" rx="10" ry="10" fill="none" stroke="#ED7100" stroke-width="1.6" stroke-dasharray="7,4"/>
<rect x="70" y="470" width="185" height="26" rx="6" fill="#ED7100"/>
<text x="163" y="488" text-anchor="middle" class="lbl mono" font-size="13" fill="#ffffff">cdk deploy --all</text>
<text x="450" y="488" text-anchor="middle" class="sub" font-size="10.5" fill="#ED7100">ordered by dependency</text>
<rect x="100.0" y="510" width="400" height="48" rx="6" fill="#faf5ff" stroke="#8C4FFF" stroke-width="1.4"/>
<rect x="100.0" y="510" width="5" height="48" rx="2" fill="#8C4FFF"/>
<text x="116.0" y="529" class="lbl" font-size="13" fill="#1F1B16">1  Network</text>
<text x="116.0" y="544" class="sub" font-size="10.5" fill="#6B7280">VPC &#183; subnets &#183; Bedrock VPCE</text>
<text x="116.0" y="557" class="sub" font-size="10.5" fill="#6B7280">0.0.0.0/0 rejected at 4 layers</text>
<line x1="300" y1="558" x2="300" y2="566" stroke="#ED7100" stroke-width="1.5" marker-end="url(#arrow-main)"/>
<rect x="100.0" y="566" width="400" height="48" rx="6" fill="#fef2f2" stroke="#DD344C" stroke-width="1.4"/>
<rect x="100.0" y="566" width="5" height="48" rx="2" fill="#DD344C"/>
<text x="116.0" y="585" class="lbl" font-size="13" fill="#1F1B16">2  Iam</text>
<text x="116.0" y="600" class="sub" font-size="10.5" fill="#6B7280">AssumeRole + TagSession (L4)</text>
<text x="116.0" y="613" class="sub" font-size="10.5" fill="#6B7280">least-privilege roles</text>

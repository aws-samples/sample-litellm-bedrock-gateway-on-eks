<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1320" width="960" height="1320">
<style>
  text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  .title { font-weight: 700; }
  .lbl { font-weight: 600; }
  .sub { font-weight: 400; }
  .mono { font-family: "JetBrains Mono", "Courier New", monospace; }
</style>
<defs>
<marker id="arrow-main" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#ED7100"/>
</marker>
<marker id="arrow-ok" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#01A88D"/>
</marker>
<marker id="arrow-fail" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#DD344C"/>
</marker>
<marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
  <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
</marker>
<linearGradient id="hdr" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0" stop-color="#8C4FFF"/><stop offset="0.5" stop-color="#527FFF"/><stop offset="1" stop-color="#01A88D"/>
</linearGradient>
<filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
  <feDropShadow dx="0" dy="1.5" stdDeviation="2.5" flood-color="#1F1B16" flood-opacity="0.12"/>
</filter>
</defs>
<rect width="960" height="1320" fill="#ffffff"/>
<rect x="0" y="0" width="960" height="6" fill="url(#hdr)"/>
<text x="480" y="46" text-anchor="middle" class="title" font-size="24" fill="#1F1B16">Deploy Flow &#8212; LiteLLM &#8594; Bedrock Gateway on EKS</text>
<text x="480" y="70" text-anchor="middle" class="sub" font-size="13" fill="#6B7280">configure &#8594; preflight (fail-fast) &#8594; cdk deploy --all &#8594; post-deploy &#8594; verify E2E</text>
<rect x="140" y="96" width="320" height="74" rx="8" ry="8" fill="#fff7ed" stroke="#ED7100" stroke-width="1.5" filter="url(#soft)"/>

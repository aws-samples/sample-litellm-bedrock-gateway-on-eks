<text x="300" y="380" text-anchor="middle" font-size="12.5" font-weight="600" fill="#1F1B16">preflight</text>
<text x="300" y="395" text-anchor="middle" font-size="11" font-weight="400" fill="#1F1B16">all checks pass?</text>

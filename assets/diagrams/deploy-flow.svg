<text x="300.0" y="142" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">multiple-choice wizard</text>
<text x="300.0" y="158" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">&#8594; config/deployment.json</text>
<line x1="300" y1="170" x2="300" y2="204" stroke="#ED7100" stroke-width="2" marker-end="url(#arrow-main)"/>
<circle r="4" fill="#ED7100">

<text x="116.0" y="712" class="sub" font-size="10.5" fill="#6B7280">Pod Identity &#183; CloudWatch &#183; ALB Controller</text>
<text x="116.0" y="725" class="sub" font-size="10.5" fill="#6B7280">LiteLLM v1.88.1  (2 replicas)</text>

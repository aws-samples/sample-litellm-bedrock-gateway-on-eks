<rect x="456" y="834" width="46" height="16" rx="4" fill="#ffffff" stroke="#C8C0AE" stroke-width="0.8"/>
<text x="479" y="846" text-anchor="middle" font-size="11" fill="#8C4FFF">yes</text>
<rect x="542" y="832" width="190" height="80" rx="8" ry="8" fill="#faf5ff" stroke="#8C4FFF" stroke-width="1.5" filter="url(#soft)"/>
<text x="637.0" y="858" text-anchor="middle" class="lbl" font-size="13" fill="#8C4FFF">REQUIRE ACM cert</text>
<text x="637.0" y="878" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">no HTTP:80 fallback</text>
<text x="637.0" y="894" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">else hard-reject deploy</text>
<line x1="300" y1="926" x2="300" y2="960" stroke="#ED7100" stroke-width="2" marker-end="url(#arrow-main)"/>
<circle r="4" fill="#ED7100">
  <animate attributeName="cx" values="300;300" dur="2.4s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="926;952" dur="2.4s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" repeatCount="indefinite"/>
</circle>
<rect x="306" y="934.0" width="95.8" height="18" rx="4" fill="#ffffff" stroke="#C8C0AE" stroke-width="0.8"/>
<text x="311" y="947.0" font-size="11" fill="#6B7280">no (internal)</text>
<rect x="110" y="960" width="380" height="74" rx="8" ry="8" fill="#eff6ff" stroke="#527FFF" stroke-width="1.5" filter="url(#soft)"/>
<text x="300.0" y="986" text-anchor="middle" class="lbl" font-size="15" fill="#1F1B16">post-deploy: render secret</text>
<text x="300.0" y="1006" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">litellm-db secret &#8592; Aurora endpoint/creds</text>
<text x="300.0" y="1022" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">apply to cluster</text>
<line x1="300" y1="1034" x2="300" y2="1068" stroke="#01A88D" stroke-width="2" marker-end="url(#arrow-ok)"/>
<circle r="4" fill="#01A88D">
  <animate attributeName="cx" values="300;300" dur="2.4s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="1034;1060" dur="2.4s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" repeatCount="indefinite"/>
</circle>
<rect x="110" y="1068" width="380" height="80" rx="8" ry="8" fill="#f0fdfa" stroke="#01A88D" stroke-width="1.5" filter="url(#soft)"/>
<text x="300.0" y="1094" text-anchor="middle" class="lbl" font-size="15" fill="#01A88D">verify E2E</text>
<text x="300.0" y="1114" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">virtual key &#8594; ALB &#8594; WAF &#8594; EKS &#8594; LiteLLM</text>
<text x="300.0" y="1130" text-anchor="middle" class="sub" font-size="11.5" fill="#6B7280">&#8594; real Bedrock claude-sonnet-4-6 + spend log</text>
<line x1="40" y1="1176" x2="920" y2="1176" stroke="#C8C0AE" stroke-width="1"/>
<text x="40" y="1194" class="lbl" font-size="12" fill="#1F1B16">Legend</text>
<line x1="40" y1="1218" x2="72" y2="1218" stroke="#ED7100" stroke-width="2" marker-end="url(#arrow-main)"/>
<text x="80" y="1222" class="sub" font-size="11.5" fill="#6B7280">deploy progression</text>
<line x1="40" y1="1238" x2="72" y2="1238" stroke="#01A88D" stroke-width="2" marker-end="url(#arrow-ok)"/>
<text x="80" y="1242" class="sub" font-size="11.5" fill="#6B7280">success / data path</text>
<line x1="40" y1="1258" x2="72" y2="1258" stroke="#DD344C" stroke-width="2" marker-end="url(#arrow-fail)"/>
<text x="80" y="1262" class="sub" font-size="11.5" fill="#6B7280">fail-fast abort / cross-account</text>
<line x1="40" y1="1278" x2="72" y2="1278" stroke="#8C4FFF" stroke-width="2" marker-end="url(#arrow-gray)"/>
<text x="80" y="1282" class="sub" font-size="11.5" fill="#6B7280">network / security gate</text>
<rect x="620" y="1192" width="300" height="82" rx="8" fill="#ffffff" stroke="#C8C0AE" stroke-width="1"/>
<text x="636" y="1214" class="lbl" font-size="11.5" fill="#1F1B16">Isolation layers provisioned</text>
<text x="636" y="1234" class="sub" font-size="10.5" fill="#6B7280">L1 public global.*   &#183;   L2 same-region VPCE</text>
<text x="636" y="1249" class="sub" font-size="10.5" fill="#6B7280">L3 cross-region us.* (peering)</text>
<text x="636" y="1264" class="sub" font-size="10.5" fill="#6B7280">L4 cross-account AssumeRole + TagSession</text>
</svg>
<text x="300" y="883" text-anchor="middle" font-size="11" font-weight="400" fill="#1F1B16">internet-facing?</text>
<line x1="300" y1="792" x2="300" y2="826" stroke="#ED7100" stroke-width="2" marker-end="url(#arrow-main)"/>
<circle r="4" fill="#ED7100">
  <animate attributeName="cx" values="300;300" dur="2.4s" repeatCount="indefinite"/>
  <animate attributeName="cy" values="792;818" dur="2.4s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" repeatCount="indefinite"/>
</circle>

  <animate attributeName="cy" values="792;818" dur="2.4s" repeatCount="indefinite"/>
  <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.15;0.85;1" dur="2.4s" repeatCount="indefinite"/>
</circle>
<polygon points="300,818 422,872 300,926 178,872" fill="#faf5ff" stroke="#8C4FFF" stroke-width="1.5" filter="url(#soft)"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 1400" width="960" height="1400">
<style>
text { font-family: 'Helvetica Neue', Helvetica, Arial, 'PingFang SC', 'Microsoft YaHei', 'SimHei', sans-serif; }
.t{font-size:14px;fill:#1F1B16;font-weight:600;}
